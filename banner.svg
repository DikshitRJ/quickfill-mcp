<svg width="1600" height="620" viewBox="0 0 1600 620" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>

    <!-- Gradient fields -->
    <radialGradient id="g1" cx="20%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="g2" cx="70%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="g3" cx="50%" cy="85%" r="60%">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>

    <!-- Blur -->
    <filter id="blur">
      <feGaussianBlur stdDeviation="70"/>
    </filter>

    <!-- Grain -->
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.7" numOctaves="2"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>

  </defs>

  <!-- Background -->
  <rect width="1600" height="620" fill="url(#bg)" rx="20" ry="20" />

  <!-- Atmosphere -->
  <g filter="url(#blur)">
    <rect width="1600" height="620" fill="url(#g1)" />
    <rect width="1600" height="620" fill="url(#g2)" />
    <rect width="1600" height="620" fill="url(#g3)" />
  </g>

  <!-- ORGANIC GRID SHAPES -->
  <g filter="url(#blur)" opacity="0.35">

    <!-- Row 1 -->
    <path d="M1050 120 C1200 80,1350 180,1300 260 C1250 340,1100 350,1000 280 C900 210,950 150,1050 120 Z"
          fill="#6366f1"/>

    <path d="M1300 80 C1400 40,1550 120,1500 200 C1450 280,1300 260,1250 180 C1200 100,1250 100,1300 80 Z"
          fill="#22c55e"/>

    <!-- Row 2 -->
    <path d="M900 350 C1050 300,1200 450,1100 520 C1000 590,800 550,780 450 C760 370,820 340,900 350 Z"
          fill="#22c55e"/>

    <path d="M1200 350 C1350 300,1500 450,1400 520 C1300 590,1150 550,1120 460 C1100 380,1150 350,1200 350 Z"
          fill="#06b6d4"/>

    <!-- Row 3 -->
    <path d="M1350 450 C1450 420,1550 500,1500 580 C1450 650,1300 630,1250 550 C1200 470,1300 450,1350 450 Z"
          fill="#6366f1"/>

  </g>

  <!-- Subtle grid guides -->
  <g stroke="#1f2937" stroke-width="1" opacity="0.15">
    <line x1="800" y1="0" x2="800" y2="620"/>
    <line x1="1200" y1="0" x2="1200" y2="620"/>
    <line x1="0" y1="300" x2="1600" y2="300"/>
  </g>

  <!-- Typography -->
  <g font-family="JetBrains Mono, monospace">
    
    <text x="140" y="220" font-size="82" fill="#ffffff">
      quickfill
    </text>

    <text x="140" y="290" font-size="30" fill="#d1d5db">
      Generative UI for AI Agents
    </text>

    <text x="140" y="330" font-size="24" fill="#9ca3af">
      Bring Claude-like Generative UI to any AI agent
    </text>

  </g>

  <!-- SYSTEM LABELS (micro descriptions) -->
  <g font-family="JetBrains Mono, monospace" font-size="14" fill="#6b7280">

    <text x="140" y="380">[ analyze ] → input data streams</text>
    <text x="140" y="405">[ generate ] → adaptive interface layer</text>
    <text x="140" y="430">[ bridge ] → local ↔ browser runtime</text>
    <text x="140" y="455">[ render ] → interactive UI surface</text>

    <text x="820" y="100">grid: active</text>
    <text x="1220" y="100">state: generative</text>
    <text x="1220" y="580">mode: realtime</text>

  </g>


  <!-- Grain -->
  <rect width="1600" height="620" filter="url(#grain)" opacity="0.2"/>

</svg>