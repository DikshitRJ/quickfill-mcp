name: Publish to NPM and GitHub

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: push to npm
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Security Audit
        run: npm audit --audit-level=high

      - name: Type Check
        run: npx tsc --noEmit

      - name: Check (Lint & Format)
        run: npm run check

      - name: Build package
        run: npm run build

      - name: Run Integration Tests
        run: npm run test

      - name: Sync package.json version with tag
        run: |
          # Extracts version from refs/tags/v1.2.3 -> 1.2.3
          VERSION=${GITHUB_REF#refs/tags/v}
          
          # If version is only X.Y, append .0 to satisfy npm's strict SemVer requirement
          if [[ $VERSION =~ ^[0-9]+\.[0-9]+$ ]]; then
            VERSION="${VERSION}.0"
          fi
          
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Syncing package.json to version $VERSION"
          npm version $VERSION --no-git-tag-version --allow-same-version

      - name: Publish to NPM
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create package tarball
        run: |
          ORIGINAL_NAME=$(npm pack --silent)
          FINAL_NAME="quickfill-mcp-v${{ env.VERSION }}.tar.gz"
          mv "$ORIGINAL_NAME" "$FINAL_NAME"
          echo "ARTIFACT_NAME=$FINAL_NAME" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ARTIFACT_NAME }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
